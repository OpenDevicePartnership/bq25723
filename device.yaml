ADC_VSYS:
  type: register
  address: 0x2D
  size_bits: 8
  access: RO
  fields:
    ADC_VSYS:
      base: uint
      start: 0
      end: 8
      access: RO
      description:  8-bit Digital Output of System Voltage

CHARGE_OPTION_1_A:
  type: register
  address: 0x30
  size_bits: 8
  reset_value: 0x00
  fields:
    AUTO_WAKEUP_EN:
      base: bool
      start: 0
      description:   Auto Wakeup Enable
                     When this bit is HIGH, if the battery is below minimum system voltage 
                     (REG0x0D/0C()), the device will automatically enable 128 mA charging current 
                     for 30 mins. When the battery is charged up above minimum system voltage, 
                     charge will terminate and the bit is reset to LOW
    EN_SHIP_DCHG:
      base: bool
      start: 1
      description:  Discharge SRN for Shipping Mode.
                    Used to discharge SRN pin capacitor voltage which
                    is necessary for battery gauge device shipping mode.
    EN_PTM:
      base: bool
      start: 2
      description:  PTM enable register bit, it will automatically reset to zero.
    FORCE_CONV_OFF:
      base: bool
      start: 3
      description:   Force Converter Off function
                     When independent comparator triggers, (CMPOUT pin pulled down) converter
                     latches off, at the same time, CHRG_OK signal goes LOW to notify the system.
                     Charge current is also set to zero internally, but charge current register setting
                     keeps the same. To get out of converter latches off, firstly the CMPOUT should
                     be released to high and secondly FORCE_CONV_OFF bit should be cleared
                     (=0b).
    CMP_DEG:
      base: uint
      start: 4
      end: 6
      conversion:
        name: "ComparatorDeglitchTime"
        Disabled: 0
        OneMicroSecond: 1
        TwoMilliseconds: 2
        FiveSeconds: 3
      description:  Independent comparator deglitch time, only applied to
                    the falling edge of
                    CMPOUT (HIGH to LOW).
    CMP_POL:
      base: bool
      start: 6
      description:  Independent Comparator output Polarity
    CMP_REF:
      base: bool
      start: 7
      description:  Independent Comparator Internal Reference.
                    The datasheet indicates
                    0 = 2.3V reference
                    1 = 1.2V reference

CHARGE_OPTION_1_B:
  type: register
  address: 0x31
  size_bits: 8
  reset_value: 0x33
  fields:
    EN_FAST_5MOHM:
      base: bool
      start: 0
      description:   Enable fast compensation to increase bandwidth under 5 mΩ RAC
                     (RSNS_RAC=1b) for input current up to 6.4-A application (the fast
                     compensation will only work when IADPT pin is configured less than 160 kΩ
    PSYS_RATIO:
      base: uint
      start: 1
      end: 2
      conversion:
        name: "PsysGain"
        ZeroPoint25uAperW: 0
        OnePoint00uAperW: 1
      description:  PSYS Gain.
                    Ratio of PSYS output current vs total input and battery
                    power.
    RSNS_RSR:
      base: uint
      start: 2
      end: 3
      conversion:
        name: "ChargeSenseResistorRsr"
        TenMilliOhms: 0
        TwentyMilliOhms: 1
      description:  Charge sense resistor RSR. 
    RSNS_RAC:
      base: uint
      start: 3
      end: 4
      conversion:
        name: "InputSenseResistorRAC"
        TenMilliOhms: 0
        TwentyMilliOhms: 1
      description:  Input sense resistor RAC. 
    PSYS_CONFIG:
      base: uint
      start: 4
      end: 6
      conversion:
        name: "PsysEnable"
        PbusAndPbat: 0
        Pbus: 1
        Reserved: 2
        Off: 3
      description:  PSYS Enable and Definition Register
                    Enable PSYS sensing circuit and output buffer (whole PSYS circuit). In low
                    power mode (EN_LWPWR=1b), PSYS sensing and buffer are always disabled
                    regardless of this bit value. 
    EN_PROCHOT_LPWR:
      base: bool
      start: 6
      description:  Enable PROCHOT during battery only low power mode
                    With battery only, enable VSYS in PROCHOT with low power consumption. Do 
                    not enable this function with adapter present.
    EN_IBAT:
      base: bool
      start: 7
      description:  IBAT Enable.
                    In low power mode (EN_LWPWR=1b), IBAT
                    buffer is always disabled regardless of this bit value.

CHARGE_OPTION_2_A:
  type: register
  address: 0x32
  size_bits: 8
  reset_value: 0xB7
  fields:
    BATOC_VTH:
      base: uint
      start: 0
      end: 1
      conversion:
        name: "BatocVth"
        OneHunderedThirtyThreePercent: 0
        TwoHundredPercent: 1
      description:  Set battery discharge overcurrent threshold as
                    percentage of PROCHOT battery discharge current limit.
    EN_BATDOC:
      base: bool
      start: 1
      description:  Battery discharge overcurrent (BATDOC) protection enable.
    ACOC_VTH:
      base: uint
      start: 2
      end: 3
      conversion:
        name: "AcocLimit"
        OneHunderedThirtyThreePercent: 0
        TwoHundredPercent: 1
      description:  ACOC Limit.
                    Set ACOC threshold as percentage of ILIM2_VTH with
                    current sensed from RAC.
    EN_ACOC:
      base: bool
      start: 3
      description:  Input overcurrent (ACOC) protection enable.
    ACX_OCP:
      base: uint
      start: 4
      end: 5
      conversion:
        name: "ACX_OCP"
        TwoHundredEightyMilliVolts: 0
        OneHundredFiftyMillivolts: 1
      description:   Input current OCP threshold by sensing ACP-ACN.
    Q2_OCP:
      base: uint
      start: 5
      end: 6
      conversion:
        name: "Q2_OCP"
        TwoHundredTenMilliVolts: 0
        OneHundredFiftyMillivolts: 1
      description:  Q2 OCP threshold by sensing Q2 VDS
    EN_ICHG_IDCHG:
      base: uint
      start: 6
      end: 7
      conversion:
        name: "IBatPinSelect"
        IBatPinAsDischarge: 0
        IBatPinAsCharge: 1
      description:  IBAT pin monitor selection for discharge current and
                    charge current.
    EN_EXTILIM:
      base: bool
      start: 7
      description:  Enable ILIM_HIZ pin to set input current limit.

CHARGE_OPTION_2_B:
  type: register
  address: 0x33
  size_bits: 8
  reset_value: 0x00
  fields:
    PKPWR_TMAX:
      base: uint
      start: 0
      end: 2
      conversion:
        name: "PkpwrTmax"
        TwentyMilliseconds: 0
        FortyMilliseconds: 1
        EightyMilliseconds: 2
        OneSecond: 3
      description:  Peak power mode overload and relax cycle time.
    PKPWR_RELAX_STAT:
      base: bool
      start: 2
      description:  Indicator that the device is in relaxation cycle
    STAT_PKPWR_OVLD:
      base: bool
      start: 3
      description:  Indicator that the device is in overloading cycle
    EN_PKPWR_VSYS:
      base: bool
      start: 4
      description:  Enable Peak Power Mode triggered by system
                    voltage under-shoot.
    EN_PKPWR_IIN_DPM:
      base: bool
      start: 5
      description:  Enable Peak Power Mode triggered by input
                    current overshoot.
    PKPWR_TOVLD_DEG:
      base: uint
      start: 6
      end: 8
      conversion:
        name: "PkpwrTovldDeg"
        OneMillisecond: 0
        TwoMilliseconds: 1
        FiveMilliseconds: 2
        TenMilliseconds: 3
      description:  Input Overload time in Peak Power Mode.

CHARGE_OPTION_3_A:
  type: register
  address: 0x34
  size_bits: 8
  reset_value: 0x34
  fields:
    PSYS_OTG_IDCHG:
      base: uint
      start: 0
      end: 1
      conversion:
        name: "PsysOtg"
        BattDischargePowerMinusOtg: 0
        BattDischargePower: 1
      description:  PSYS definition during OTG mode.
    BATFETOFF_HIZ:
      base: bool
      start: 1
      description:  BATFET off during HIZ mode?
    CMP_EN:
      base: bool
      start: 2
      description:  Enable Independent Comparator with effective low
    IL_AVG:
      base: uint
      start: 3
      end: 5
      conversion:
        name: "ILAvgClamp"
        SixAmps: 0
        TenAmps: 1
        FifteenAmps: 2
        Disabled: 3
      description:  Inductor average current clamp.
    OTG_VAP_MODE:
      base: bool
      start: 5
      description:  The selection of the external OTG/VAP/FRS pin control. Don't
                    recommend to change pin control after OTG/VAP/FRS pin is pulled high.
    EN_VBUS_VAP:
      base: bool
      start: 6
      description:   Enable the VBUS VAP for VAP operation mode 2&3
    BATFET_ENZ:
      base: bool
      start: 7
      description:    Turn off BATFET under battery only mode. If charger is not in battery only
                      mode this bit is not allowed to be written to 1. Under battery only OTG
                      mode, this bit is forced to be 0b.

CHARGE_OPTION_3_B:
  type: register
  address: 0x35
  size_bits: 8
  reset_value: 0x05
  fields:
    EN_OTG_BIGCAP:
      base: bool
      start: 0
      description:   Enable OTG compensation for VBUS effective capacitance larger than 33μF
    EN_VSYS_MIN_SOFT_SR:
      base: bool
      start: 1
      description:    Enable VSYS_MIN soft slew rate transition
    EN_PORT_CTRL:
      base: bool
      start: 2
      description:    Enable BATFET control
    EN_ICO_MODE:
      base: bool
      start: 3
      description:  Enable ICO Algorithm.
    EN_OTG:
      base: bool
      start: 4
      description:  OTG Mode Enable.
                    Enable device in OTG mode when EN_OTG pin is
                    HIGH.
    RESET_VINDPM:
      base: bool
      start: 5
      description:  Reset VINDPM Threshold
    RESET_REG:
      base: bool
      start: 6
      description:  Factory Reset Registers.
    EN_HIZ:
      base: bool
      start: 7
      description:  Device Hi-Z Mode Enable.
                    When the charger is in Hi-Z mode, the device draws
                    minimal quiescent current. With VBUS above UVLO.
                    REGN LDO stays on, and system powers from battery.

PROCHOT_OPTION_0_A:
  type: register
  address: 0x36
  size_bits: 8
  reset_value: 0x81
  fields:
    LOWER_PROCHOT_VINDPM:
      base: bool
      start: 0
      description:  Enable lower threshold of PROCHOT_VINDPM
                    comparator.
    INOM_DEG:
      base: uint
      start: 1
      end: 2
      conversion:
        name: "InomDeglitchTime"
        Short: 0
        Long: 1
      description:  INOM deglitch time.
    VSYS_TH1:
      base: uint
      start: 2
      end: 8
      description:  VSYS Threshold to trigger discharging VBUS in VAP mode.
                    Measure on VSYS with fixed 5-µs deglitch time. Trigger when SYS pin voltage is
                    below the thresholds. There is a fixed DC offset which is 3.2 V.
                    2S - 4s battery (Default 6.4 V)

PROCHOT_OPTION_0_B:
  type: register
  address: 0x37
  size_bits: 8
  reset_value: 0x4A
  fields:
    PROCHOT_VINDPM_80_90:
      base: uint
      start: 0
      end: 1
      conversion:
        name: "Threshold"
        EightyThreePercent: 0
        NinetyOnePercent: 1
      description:  Lower threshold of the PROCHOT_VINDPM
                    comparator.
                    When LOWER_PROCHOT_VINDPM=1, the threshold
                    of PROCHOT_VINDPM is determined by this setting.
    ICRIT_DEG:
      base: uint
      start: 1
      end: 3
      conversion:
        name: "ICRITDeglitchTime"
        FifteenMicroSeconds: 0
        OneHundredMicroSeconds: 1
        FourHundredMicroSeconds: 2
        EightHundredMicroSeconds: 3
      description:  ICRIT deglitch time to trigger PROCHOT.
    ILIM2_VTH:
      base: uint
      start: 3
      end: 8
      description:  ILIM2 Threshold.

PROCHOT_OPTION_1_A:
