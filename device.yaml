    PP_BATPRES:
      base: bool
      start: 1
      description:  Battery removal PROCHOT profile enable.
    PP_VSYS:
      base: bool
      start: 2
      description:  VSYS PROCHOT profile enable.
    PP_IDCHG1:
      base: bool
      start: 3
      description:  IDCHG1 PROCHOT profile enable.
    PP_INOM:
      base: bool
      start: 4
      description:  INOM PROCHOT profile enable.
    PP_ICRIT:
      base: bool
      start: 5
      description:  ICRIT PROCHOT profile enable. 
    PP_COMP:
      base: bool
      start: 6
      description:  COMP PROCHOT profile enable.
    PP_VINDPM:
      base: bool
      start: 7
      description:  VINDPM PROCHOT profile enable.

PROCHOT_OPTION_1_B:
  type: register
  address: 0x39
  size_bits: 8
  reset_value: 0x41
  fields:
    IDCHG_DEG1:
      base: uint
      start: 0
      end: 2
      conversion:
        name: "IdchgDeglitchTime"
        SeventyEightMilliseconds: 0
        OnePointTwoFiveSeconds: 1
        FiveSeconds: 2
        TwentySeconds: 3
      description:  IDCHG deglitch time.
    IDCHG_TH1:
      base: uint
      start: 2
      end: 8
      description:  IDCHG level 1 Threshold.

ADC_OPTION_A:
  type: register
  address: 0x3A
  size_bits: 8
  reset_value: 0x00
  fields:
