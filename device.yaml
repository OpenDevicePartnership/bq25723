config:
  register_address_type: u8
  default_byte_order: LE
  default_bit_order: LSB0
  defmt_feature: defmt-03

CHARGE_OPTION_0_A:
  type: register
  address: 0x00
  size_bits: 8
  reset_value: 0x0E
  fields:
    CHRG_INHIBIT:
      base: bool
      start: 0
      description:  Charge Inhibit. When bit is 0 battery charging will start with valid values in the CHARGE_VOLTAGE() and CHARGE_CURRENT().
    EN_IIN_DPM:
      base: bool
      start: 1
      description:  IIN_DPM Enable.
                    Host writes this bit to enable IIN_DPM regulation loop.
                    When the IIN_DPM is disabled
                    by the charger (refer to IIN_DPM_AUTO_DISABLE),
                    this bit goes LOW. Under OTG mode, this bit is also
                    used to enable/disable IOTG regulation.
    EN_LDO:
      base: bool
      start: 2
      description:  LDO Mode Enable. 
                    When battery voltage is below VSYS_MIN(), the
                    charger is in pre-charge with LDO mode enabled.
    IBAT_GAIN:
      base: uint
      start: 3
      end: 4
      conversion:
        name: "IbatGain"
        EightX: 0
        SixtyFourX: 1
      description:  IBAT Amplifier Ratio.
                    The ratio of voltage on IBAT and voltage across SRP
                    and SRN.
    IADPT_GAIN:
      base: uint
      start: 4
      end: 5
      conversion:
        name: "IadptGain"
        TwentyX: 0
        FortyX: 1
      description:  IADPT Amplifier Ratio.
                    The ratio of voltage on IADPT and voltage across ACP
                    and ACN.
    EN_LEARN:
      base: bool
      start: 5
      description:  LEARN mode function enable.
    VSYS_UVP_ENZ:
      base: bool
      start: 6
      description:  Disable system under voltage protection.
    EN_CMP_LATCH:
      base: bool
      start: 7
      description:  Enable Latch of Independent Comparator. Comparator
                    output with effective low. If enabled in PROCHOT
                    profile PP_CMP=1b, STAT_COMP bit keep 1b after
                    triggered until read by host and clear. host can clear
                    CMPOUT pin by toggling this EN_CMP_LATCH bit.

CHARGE_OPTION_0_B:
  type: register
  address: 0x01
  size_bits: 8
  reset_value: 0xE7
  fields:
    DIS_STRGRV:
      base: bool
      start: 0
      description:  Switching HS MOSFET turn on gate drive strength.
    PWM_FREQ:
      base: uint
      conversion:
        name: "SwitchingFreq"
        EightHundredkHz: 0
        SixHundredkHz: 1
      start: 1
      end: 2
      description:  Switching Frequency Selection.
    EN_OOA:
      base: bool
      start: 2
      description:  Out-of-Audio Enable.
    OTG_ON_CHRGOK:
      base: bool
      start: 3
      description:  Add OTG to CHRG_OK.
    IIN_DPM_AUTO_DISABLE:
      base: bool
      start: 4
      description:  IIN_DPM Auto Disable.
    WDTMR_ADJ:
      base: uint
      conversion:
        name: "MaxDelay"
        Disable: 0
        FiveSeconds: 1
        EightyEightSeconds: 2
        OneHundredSeventyFiveSeconds: 3
      start: 5
      end: 7
      description:  WATCHDOG Timer Adjust.
                    Set maximum delay between consecutive EC host
                    write of charge voltage or charge current command.
    EN_LWPWR:
      base: bool
      start: 7
      description:  Low Power Mode enable.

CHARGE_CURRENT:
  type: register
  address: 0x02
  size_bits: 16
  reset_value: 0x0000
  fields:
    CHARGE_CURRENT:
      base: uint
      start: 6
      end: 13
      description:  Charge current setting 

CHARGE_VOLTAGE:
  type: register
  address: 0x04
  size_bits: 16
  reset_value: 0x0000
  fields:
    CHARGE_VOLTAGE:
      base: uint
      start: 3
      end: 15
      description:  Charge voltage setting.

CHARGER_STATUS_0_A:
  type: register
  address: 0x20
  size_bits: 8
  reset_value: 0x00
  fields:
    FAULT_OTG_UVP:
      base: bool
      start: 0
      access: RO
      description:   The faults are latched until a read from host.
    FAULT_OTG_OVP:
      base: bool
      start: 1
      access: RO
      description:   The faults are latched until a read from host.
    FAULT_FORCE_CONVERTER_OFF:
      base: bool
      start: 2
      access: RO
      description:   The faults are latched until a read from host.
    FAULT_VSYS_UVP:
      base: bool
      start: 3
      access: RW
      description:   VSYS_UVP fault status and clear. VSYS_UVP fault is latched until a
                     clear from host by writing this bit to 0.
    FAULT_SYSOVP:
      base: bool
      start: 4
      access: RW
      description:  SYSOVP Status and Clear
                    When the SYSOVP occurs, this bit is HIGH. During the SYSOVP, the 
                    converter is disabled.
                    After the SYSOVP is removed, the user must write a 0 to this bit 
                    or unplug the adapter to clear the SYSOVP condition to enable the 
                    converter again.
    FAULT_ACOC:
      base: bool
      start: 5
      access: RO
      description:  The faults are latched until a read from host.
    FAULT_BATOC:
      base: bool
      start: 6
      access: RO
      description:  The faults are latched until a read from host.
    FAULT_ACOV:
      base: bool
      start: 7
      access: RO
      description:  The faults are latched until a read from host.

CHARGER_STATUS_0_B:
  type: register
  address: 0x21
  size_bits: 8
  reset_value: 0x00
  access: RO
  fields:
    IN_OTG:
      base: bool
      start: 0
      access: RO
      description:   OTG?
    IN_PCHRG:
      base: bool
      start: 1
      access: RO
      description:   Pre charge?
    IN_FCHRG:  
      base: bool
      start: 2
      access: RO
      description:   Fast charge?
    IN_IIN_DPM:
      base: bool
      start: 3
      access: RW
      description:  The fault is latched until a clear from host by writing this bit to 0.
    IN_VIND_PM:
      base: bool
      start: 4
      access: RW
      description:  VINDPM during forward mode, or voltage regulation during OTG mode?
    IN_VAP:
      base: bool
      start: 5
      access: RO
      description:  VAP Mode?
    ICO_DONE:
      base: bool
      start: 6
      access: RO
      description:   After the ICO routine is successfully executed, the bit goes 1.
    STAT_AC:
      base: bool
      start: 7
      access: RO
      description:    Input source status. STAT_AC is valid as long as VBUS go within
                      3.5-V to 26-V range. It is different from CHRG_OK bit, When
                      CHRG_OK is valid, STAT_AC must be valid, but if STAT_AC is valid,
                      it is not necessary CHRG_OK is valid. There are Force converter
                      off, ACOC, TSHUT , SYSOVP, VSYS_UVP, BATOVP can pull low
                      CHRG_OK.

PROCHOT_STATUS_REG_A:
  type: register
  address: 0x22
  size_bits: 8
  reset_value: 0x00
  fields:
    STAT_ADAPTER_REMOVAL:
      base: bool
      start: 0
      access: RO
      description:  Adapter removed?
    STAT_BATTERY_REMOVAL:
      base: bool
      start: 1
      access: RO
      description:  Battery removed?
    STAT_VSYS:
      base: bool
      start: 2
      access: RO
      description:  VSYS status triggered?
    STAT_IDCHG1:
      base: bool
      start: 3
      access: RO
      description:  IDCHG1 status triggered?
    STAT_INOM:
      base: bool
      start: 4
      access: RO
      description:  INOM status triggered?
    STAT_ICRIT:
      base: bool
      start: 5
      access: RO
      description:  ICRIT status triggered?
    STAT_COMP:
      base: bool
      start: 6
      access: RO
      description:  COMP status triggered?
    STAT_VINDPM:
      base: bool
      start: 7
      access: RW
      description:  VINDPM status triggered?

PROCHOT_STATUS_REG_B:
  type: register
  address: 0x23
  size_bits: 8
  reset_value: 0x38
  fields:
    STAT_EXIT_VAP:
      base: bool
      start: 0
      access: RW
      description:  PROCHOT_EXIT_VAP is active?
    STAT_VAP_FAIL:
      base: bool
      start: 1
      access: RW
      description:  In VAP failure?
    TSHUT:
      base: bool
      start: 2
      access: RO
      description:  TSHUT trigger
    PROCHOT_CLEAR:
      base: bool
      start: 3
      access: RW
      description:  PROCHOT Pulse Clear.
                    Clear PROCHOT pulse when
                    EN_PROCHOT_EXT=0b.
    PROCHOT_WIDTH:
      base: uint
      start: 4
      end: 6
      access: RW
      conversion:
        name: "ProchotPulseWidth"
        OneHundredMicroseconds: 0
        OneMillisecond: 1
        FiveMilliseconds: 2
        TenMilliseconds: 3
      description:  PROCHOT Pulse Width when
                    EN_PROCHOT_EXT = 0b.
    EN_PROCHOT_EXT:
      base: bool
      start: 6
      access: RW
      description:  PROCHOT Pulse Extension Enable. When pulse
                    extension is enabled, keep the PROCHOT pin voltage
                    LOW until host writes PROCHOT_CLEAR= 0b.

IIN_DPM:
  type: register
  address: 0x24
  size_bits: 16
  reset_value: 0x4100
  fields:
    IIN_DPM:
      base: uint
      start: 8
      end: 15
      description:  Actual input current limit 

