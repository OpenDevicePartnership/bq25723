ADC_OPTION_B:
  type: register
  address: 0x3B
  size_bits: 8
  reset_value: 0x20
  fields:
    ADC_FULL_SCALE:
      base: bool
      start: 5
      description:   ADC input voltage range. When input voltage is below 5 V, or battery is 1S, 
                     full scale 2.04 V is recommended.
                     0b 2.04 V
                     1b 3.06 V <default at POR>
    ADC_START:
      base: bool
      start: 6
      description:  ADC start control. After the one-shot update is complete, this bit 
                    automatically resets to zero
    ADC_CONV:
      base: bool
      start: 7 
      description:  Typical ADC conversion time is 10 ms. 
                    0b OneShot
                    1b Continuous
CHARGE_OPTION_4_A:
  type: register
  address: 0x3C
  size_bits: 8
  reset_value: 0x48
  fields:
    STAT_PTM:
      base: bool
      start: 0
      description:  PTM operation status active.
    STAT_IDCHG2:
      base: bool
      start: 1
      description:  IDCHG2 status triggered.
    PP_IDCHG2:
      base: bool
      start: 2
      description:  Enable IDCHG_TH2 PROCHOT Profile.
    IDCHG_TH2:
      base: uint
      start: 3
      end: 6
      description:  Battery discharge current limit2 based on percentage
                    of IDCHG_TH1.
    IDCHG_DEG2:
      base: uint
      start: 6
      end: 8
      conversion:
        name: "IdchgDeglitchTime2"
        VeryShort: 0
        Short: 1
        Long: 2
        VeryLong: 3
      description:  Battery discharge current limit 2 deglitch time.

CHARGE_OPTION_4_B:
  type: register
  address: 0x3D
  size_bits: 8
  reset_value: 0x00
  fields:
    STAT_VBUS_VAP:
      base: bool
      start: 0
      description: VBUS_VAP status triggered.
    PP_VBUS_VAP:
      base: bool
      start: 1
      description:  Enable VBUS_VAP PROCHOT Profile.
    VSYS_UVP_NO_HICCUP:
      base: bool
      start: 2
      description:  Disable VSYS_UVP Hiccup mode operation.
    EN_DITHER:
      base: uint
      start: 3
      end: 5
      conversion:
        name: "DitherConfig"
        Disable: 0
        OneX: 1
        TwoX: 2
        ThreeX: 3
      description:  Frequency Dither configuration.
    VSYS_UVP:
      base: uint
      start: 5
      end: 8
      description:  VSYS Under Voltage Lock Out. After UVP is triggered
                    the charger enters
                    hiccup mode, and then the charger is latched off if the
                    restart fails 7 times
                    in 90s.

