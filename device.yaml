# Note: This register definition was generated using the official datasheet and an LLM

config:
  register_address_type: u8
  default_byte_order: LE
  default_bit_order: LSB0
  defmt_feature: defmt-03

CHARGE_OPTION_0:
  type: register
  address: 0x00
  size_bits: 16
  reset_value: 0xE70E
  fields:
    CHRG_INHIBIT:
      base: bool
      start: 0
      description: Charge Inhibit. When this bit is 0, battery charging will start with valid
                   values in the ChargeVoltage() and ChargeCurrent() registers.
    EN_IIN_DPM:
      base: bool
      start: 1
      description: IIN_DPM Enable. Host writes this bit to enable IIN_DPM regulation loop.
                   When the IIN_DPM is disabled by the charger (refer to IIN_DPM_AUTO_DISABLE),
                   this bit goes LOW.
    EN_LDO:
      base: bool
      start: 2
      description: LDO Mode Enable. When battery voltage is below minimum system voltage,
                   the charger is in pre-charge with LDO mode enabled. When enabled, precharge
                   current is set by ChargeCurrent register and clamped below 384 mA (2-4 cell,
                   1 cell VBAT<3.0V) or 2A (1 cell 3.0V<VBAT<3.6V).
    IBAT_GAIN:
      base: uint
      start: 3
      end: 4
      conversion:
        name: "IbatGain"
        EightX: 0
        SixteenX: 1
      description: IBAT Amplifier Ratio. The ratio of voltage on IBAT and voltage across
                   SRP and SRN. 0=8x, 1=16x.
    IADPT_GAIN:
      base: uint
      start: 4
      end: 5
      conversion:
        name: "IadptGain"
        TwentyX: 0
        FortyX: 1
      description: IADPT Amplifier Ratio. The ratio of voltage on IADPT and voltage across
                   ACP and ACN. 0=20x, 1=40x.
    EN_LEARN:
      base: bool
      start: 5
      description: LEARN mode allows the battery to discharge and converter to shut off
                   while the adapter is present. It calibrates the battery gas gauge over
                   a complete discharge/charge cycle.
    VSYS_UVP_ENZ:
      base: bool
      start: 6
      description: Disable system under voltage protection. 0=VSYS UVP enabled (default),
                   1=VSYS UVP disabled.
    EN_CMP_LATCH:
      base: bool
      start: 7
      description: Latch the independent comparator output after it is triggered at low
                   state. If enabled in PROCHOT profile PP_CMP=1, STAT_COMP bit keeps 1
                   after triggered until read by host and cleared. Host can clear CMPOUT
                   pin by toggling this bit.
    DIS_STRGRV:
      base: bool
      start: 8
      description: Switching HS MOSFET turn on gate drive strength.
                   0=Enable strong drive, 1=Disable strong drive.
    PWM_FREQ:
      base: uint
      start: 9
      end: 10
      conversion:
        name: "SwitchingFreq"
        TwelveHundredkHz: 0
        EightHundredkHz: 1
      description: Switching Frequency Selection. Recommend 1200 kHz with 1 uH,
                   800 kHz with 2.2 uH. 0=1200 kHz, 1=800 kHz.
    EN_OOA:
      base: bool
      start: 10
      description: Out-of-Audio Enable. Set minimum PFM burst frequency to above 25 kHz
                   to avoid audio noise.
    OTG_ON_CHRGOK:
      base: bool
      start: 11
      description: Add OTG to CHRG_OK. Drive CHRG_OK HIGH when the device is in OTG mode.
    IIN_DPM_AUTO_DISABLE:
      base: bool
      start: 12
      description: IIN_DPM Auto Disable. When CELL_BATPRESZ pin is LOW, the charger
                   automatically disables the IIN_DPM function by setting EN_IIN_DPM to 0.
    WDTMR_ADJ:
      base: uint
      start: 13
      end: 15
      conversion:
        name: "WatchdogTimerAdj"
        Disabled: 0
        FiveSeconds: 1
        EightyEightSeconds: 2
        OneHundredSeventyFiveSeconds: 3
      description: WATCHDOG Timer Adjust. Set maximum delay between consecutive host
                   write of charge voltage or charge current command. If device does not
                   receive a write within this period, ChargeCurrent is set to 0 mA.
    EN_LWPWR:
      base: bool
      start: 15
      description: Low Power Mode Enable. In low power mode, lowest quiescent current is
                   achieved when only battery exists. REGN is off. PROCHOT, discharge
                   current monitor buffer, power monitor buffer and independent comparator
                   are disabled. ADC is not available.

CHARGE_CURRENT:
  type: register
  address: 0x02
  size_bits: 16
  reset_value: 0x0000
  fields:
    CHARGE_CURRENT:
      base: uint
      start: 6
      end: 13
      description: 7-bit charge current setting. With 10 mOhm sense resistor (RSNS_RSR=0),
                   LSB=64 mA, range 0-8128 mA. With 5 mOhm sense resistor (RSNS_RSR=1),
                   LSB=128 mA, range 0-16256 mA.

CHARGE_VOLTAGE:
  type: register
  address: 0x04
  size_bits: 16
  reset_value: 0x0000
  fields:
    CHARGE_VOLTAGE:
      base: uint
      start: 3
      end: 15
      description: 12-bit charge voltage setting. LSB=8 mV, range 1024-19200 mV.
                   Default depends on CELL_BATPRESZ pin setting
                   (1S=4200 mV, 2S=8400 mV, 3S=12600 mV, 4S=16800 mV).
                   Any write below 1024 mV or above 19200 mV is ignored.

OTG_VOLTAGE:
  type: register
  address: 0x06
  size_bits: 16
  reset_value: 0x09C4
  fields:
    OTG_VOLTAGE:
      base: uint
      start: 2
      end: 14
      description: 12-bit OTG output voltage setting. LSB=8 mV, range 3000-24000 mV.
                   Default 5000 mV (USB). Any write below 3000 mV or above 24000 mV
                   is ignored.

OTG_CURRENT:
  type: register
  address: 0x08
  size_bits: 16
  reset_value: 0x3C00
  fields:
    OTG_CURRENT:
      base: uint
      start: 8
      end: 15
      description: 7-bit OTG output current limit. With 10 mOhm sense resistor,
                   LSB=50 mA, range 0-6350 mA. Default 3000 mA.

INPUT_VOLTAGE:
  type: register
  address: 0x0A
  size_bits: 16
  fields:
    INPUT_VOLTAGE:
      base: uint
      start: 6
      end: 14
      description: 8-bit input voltage (VINDPM) setting. LSB=64 mV, range 3200-19520 mV.
                   Fixed DC offset of 3200 mV. Default is VBUS at no load minus 1.28 V.

VSYS_MIN:
  type: register
  address: 0x0C
  size_bits: 16
  reset_value: 0x0000
  fields:
    VSYS_MIN:
      base: uint
      start: 8
      end: 16
      description: 8-bit minimum system voltage setting. LSB=100 mV, range 1000-19200 mV.
                   Default depends on CELL_BATPRESZ pin (1S=3600 mV, 2S=6600 mV,
                   3S=9200 mV, 4S=12300 mV). Writing 0 sets to default based on
                   CELL_BATPRESZ pin.

IIN_HOST:
  type: register
  address: 0x0E
  size_bits: 16
  reset_value: 0x4100
  fields:
    IIN_HOST:
      base: uint
      start: 8
      end: 15
      description: 7-bit input current limit set by host. With 10 mOhm sense resistor
                   (RSNS_RAC=0), LSB=50 mA, range 50-6350 mA, default 3250 mA.
                   50 mA offset at code 0. With 5 mOhm sense resistor (RSNS_RAC=1),
                   100 mA offset at code 0. Upon adapter removal, reset to default.

CHARGER_STATUS:
  type: register
  address: 0x20
  size_bits: 16
  reset_value: 0x0000
  fields:
    FAULT_OTG_UVP:
      base: bool
      start: 0
      access: RO
      description: OTG UVP fault. Latched until read by host.
    FAULT_OTG_OVP:
      base: bool
      start: 1
      access: RO
      description: OTG OVP fault. Latched until read by host.
    FAULT_FORCE_CONVERTER_OFF:
      base: bool
      start: 2
      access: RO
      description: Force converter off fault (when FORCE_CONV_OFF=1).
                   Latched until read by host.
    FAULT_VSYS_UVP:
      base: bool
      start: 3
      access: RW
      description: VSYS_UVP fault status and clear. Latched until cleared by host
                   writing this bit to 0. Set when system voltage is lower than
                   VSYS_UVP and 7 restart attempts fail.
    FAULT_SYSOVP:
      base: bool
      start: 4
      access: RW
      description: SYSOVP Status and Clear. When SYSOVP occurs, this bit is HIGH
                   and converter is disabled. Write 0 or unplug adapter to clear
                   the SYSOVP latch and re-enable converter.
    FAULT_ACOC:
      base: bool
      start: 5
      access: RO
      description: ACOC fault. Latched until read by host.
    FAULT_BATOC:
      base: bool
      start: 6
      access: RO
      description: BATOC fault. Latched until read by host. In PTM mode when
                   EN_BATOC=1, indicates both BATOVP and BATOC.
    FAULT_ACOV:
      base: bool
      start: 7
      access: RO
      description: ACOV fault. Latched until read by host.
    IN_OTG:
      base: bool
      start: 8
      access: RO
      description: Charger is in OTG mode.
    IN_PCHRG:
      base: bool
      start: 9
      access: RO
      description: Charger is in pre-charge.
    IN_FCHRG:
      base: bool
      start: 10
      access: RO
      description: Charger is in fast charge.
    IN_IIN_DPM:
      base: bool
      start: 11
      access: RO
      description: Charger is in IIN_DPM during forward mode.
    IN_VINDPM:
      base: bool
      start: 12
      access: RO
      description: Charger is in VINDPM during forward mode, or voltage regulation
                   during OTG mode.
    IN_VAP:
      base: bool
      start: 13
      access: RO
      description: Charger is operated in VAP mode.
    ICO_DONE:
      base: bool
      start: 14
      access: RO
      description: ICO routine successfully completed.
    STAT_AC:
      base: bool
      start: 15
      access: RO
      description: Input source status. Valid when VBUS is within 3.5 V to 26 V range.
                   Different from CHRG_OK; CHRG_OK valid implies STAT_AC valid but not
                   vice versa. Force converter off, ACOC, TSHUT, SYSOVP, VSYS_UVP,
                   BATOVP can pull CHRG_OK low.

PROCHOT_STATUS:
  type: register
  address: 0x22
  size_bits: 16
  reset_value: 0xB800
  fields:
    STAT_ADAPTER_REMOVAL:
      base: bool
      start: 0
      access: RO
      description: PROCHOT Profile Adapter Removal status. Latched until read by host.
    STAT_BATTERY_REMOVAL:
      base: bool
      start: 1
      access: RO
      description: PROCHOT Profile Battery Removal status. Latched until read by host.
    STAT_VSYS:
      base: bool
      start: 2
      access: RO
      description: PROCHOT Profile VSYS status. Latched until read by host.
    STAT_IDCHG1:
      base: bool
      start: 3
      access: RO
      description: PROCHOT Profile IDCHG1 status. Latched until read by host.
    STAT_INOM:
      base: bool
      start: 4
      access: RO
      description: PROCHOT Profile INOM status. Latched until read by host.
    STAT_ICRIT:
      base: bool
      start: 5
      access: RO
      description: PROCHOT Profile ICRIT status. Latched until read by host.
    STAT_COMP:
      base: bool
      start: 6
      access: RO
      description: PROCHOT Profile CMPOUT status. Latched until read by host.
    STAT_VINDPM:
      base: bool
      start: 7
      access: RW
      description: PROCHOT Profile VINDPM status. PROCHOT pin stays low until host
                   writes this status bit to 0 when PP_VINDPM=1.
    STAT_EXIT_VAP:
      base: bool
      start: 8
      access: RW
      description: PROCHOT_EXIT_VAP status. When charger exits VAP mode (host disable
                   or faults), PROCHOT pin stays low until host writes this bit to 0.
    STAT_VAP_FAIL:
      base: bool
      start: 9
      access: RW
      description: VAP failure status. Reports failure to load VBUS 7 consecutive times
                   in VAP mode. Charger exits VAP and latches off until host writes 0.
    TSHUT:
      base: bool
      start: 10
      access: RO
      description: Thermal shutdown triggered. Latched until read by host. If TSHUT is
                   still present during read, bit remains set.
    PROCHOT_CLEAR:
      base: bool
      start: 11
      access: RW
      description: PROCHOT Pulse Clear. Write 0 to clear PROCHOT pulse and drive
                   PROCHOT pin HIGH when EN_PROCHOT_EXT=1.
    PROCHOT_WIDTH:
      base: uint
      start: 12
      end: 14
      access: RW
      conversion:
        name: "ProchotPulseWidth"
        OneHundredMicroseconds: 0
        OneMillisecond: 1
        FiveMilliseconds: 2
        TenMilliseconds: 3
      description: PROCHOT Pulse Width minimum when EN_PROCHOT_EXT=0.
    EN_PROCHOT_EXT:
      base: bool
      start: 14
      access: RW
      description: PROCHOT Pulse Extension Enable. Keep PROCHOT pin LOW until host
                   writes PROCHOT_CLEAR=0.

IIN_DPM:
  type: register
  address: 0x24
  size_bits: 16
  reset_value: 0x4100
  access: RO
  fields:
    IIN_DPM:
      base: uint
      start: 8
      end: 15
      access: RO
      description: 7-bit actual input current limit in use. With 10 mOhm sense resistor,
                   LSB=50 mA. May differ from IIN_HOST after ICO. 50 mA offset at code 0.

ADC_VBUS_PSYS:
  type: register
  address: 0x26
  size_bits: 16
  access: RO
  fields:
    ADC_PSYS:
      base: uint
      start: 0
      end: 8
      access: RO
      description: 8-bit digital output of system power.
                   Full range 3.06 V, LSB 12 mV (ADC_FULLSCALE=1).
                   Full range 2.04 V, LSB 8 mV (ADC_FULLSCALE=0).
    ADC_VBUS:
      base: uint
      start: 8
      end: 16
      access: RO
      description: 8-bit digital output of input voltage. Full range 0-24480 mV,
                   LSB 96 mV.

ADC_IBAT:
  type: register
  address: 0x28
  size_bits: 16
  access: RO
  fields:
    ADC_IDCHG:
      base: uint
      start: 0
      end: 7
      access: RO
      description: 7-bit digital output of battery discharge current. With 10 mOhm
                   sense resistor (RSNS_RSR=0), full range 32512 mA, LSB 256 mA.
                   With 5 mOhm (RSNS_RSR=1), full range 65024 mA, LSB 512 mA.
    ADC_ICHG:
      base: uint
      start: 8
      end: 15
      access: RO
      description: 7-bit digital output of battery charge current. With 10 mOhm
                   sense resistor (RSNS_RSR=0), full range 8128 mA, LSB 64 mA.
                   With 5 mOhm (RSNS_RSR=1), full range 16256 mA, LSB 128 mA.

ADC_IIN_CMPIN:
  type: register
  address: 0x2A
  size_bits: 16
  access: RO
  fields:
    ADC_CMPIN:
      base: uint
      start: 0
      end: 8
      access: RO
      description: 8-bit digital output of CMPIN voltage.
                   Full range 3.06 V, LSB 12 mV (ADC_FULLSCALE=1).
                   Full range 2.04 V, LSB 8 mV (ADC_FULLSCALE=0).
    ADC_IIN:
      base: uint
      start: 8
      end: 16
      access: RO
      description: 8-bit digital output of input current. With 10 mOhm sense resistor
                   (RSNS_RAC=0), full range 12750 mA, LSB 50 mA. With 5 mOhm
                   (RSNS_RAC=1), full range 25500 mA, LSB 100 mA.

ADC_VSYS_VBAT:
  type: register
  address: 0x2C
  size_bits: 16
  access: RO
  fields:
    ADC_VBAT:
      base: uint
      start: 0
      end: 8
      access: RO
      description: 8-bit digital output of battery voltage. Full range 2.88-19.2 V,
                   LSB 64 mV. Fixed offset 2.88 V.
    ADC_VSYS:
      base: uint
      start: 8
      end: 16
      access: RO
      description: 8-bit digital output of system voltage. Full range 2.88-19.2 V,
                   LSB 64 mV. Fixed offset 2.88 V.

MANUFACTURER_ID:
  type: register
  address: 0x2E
  size_bits: 8
  reset_value: 0x40
  access: RO
  fields:
    MANUFACTURER_ID:
      base: uint
      start: 0
      end: 8
      access: RO
      description: Manufacturer ID. Always returns 0x40.

DEVICE_ID:
  type: register
  address: 0x2F
  size_bits: 8
  reset_value: 0xE0
  access: RO
  fields:
    DEVICE_ID:
      base: uint
      start: 0
      end: 8
      access: RO
      description: Device ID. BQ25723 returns 0xE0 (11010000b).

CHARGE_OPTION_1:
  type: register
  address: 0x30
  size_bits: 16
  reset_value: 0x3300
  fields:
    AUTO_WAKEUP_EN:
      base: bool
      start: 0
      description: Auto Wakeup Enable. If battery is below VSYS_MIN, device automatically
                   enables 128 mA charging current for 30 mins. When battery charges above
                   minimum system voltage, charge terminates and bit resets to LOW.
    EN_SHIP_DCHG:
      base: bool
      start: 1
      description: Discharge SRN for Shipping Mode. When set, discharge SRN pin down in
                   140 ms at 20 mA. Auto-resets to 0 after 140 ms. Used to discharge VBAT
                   pin capacitor voltage for battery gauge device shipping mode.
    EN_PTM:
      base: bool
      start: 2
      description: PTM (Pass Through Mode) enable. In PTM, buck and boost high-side FETs
                   are both ON, low-side FETs both OFF. Input power passes directly through
                   to system. Automatically resets to zero.
    FORCE_CONV_OFF:
      base: bool
      start: 3
      description: Force Converter Off function. When independent comparator triggers
                   (CMPOUT pulled down), converter latches off and CHRG_OK goes LOW.
                   To exit, CMPOUT must be released high and this bit must be cleared.
    CMP_DEG:
      base: uint
      start: 4
      end: 6
      conversion:
        name: "ComparatorDeglitchTime"
        FiveMicroseconds: 0
        TwoMilliseconds: 1
        TwentyMilliseconds: 2
        FiveSeconds: 3
      description: Independent comparator deglitch time, applied to falling edge of
                   CMPOUT (HIGH to LOW).
    CMP_POL:
      base: bool
      start: 6
      description: Independent Comparator output Polarity.
                   0=CMPIN above threshold makes CMPOUT LOW (internal hysteresis).
                   1=CMPIN below threshold makes CMPOUT LOW (external hysteresis).
    CMP_REF:
      base: bool
      start: 7
      description: Independent Comparator internal Reference. 0=2.3 V, 1=1.2 V.
    EN_FAST_5MOHM:
      base: bool
      start: 8
      description: Enable fast compensation to increase bandwidth under 5 mOhm RAC
                   (RSNS_RAC=1) for input current up to 6.4 A. When 0, IIN_HOST DAC
                   extends to 10 A but ICHG loop is slower. When 1, IIN_HOST DAC
                   clamped at 6.4 A with faster ICHG loop.
    PSYS_RATIO:
      base: uint
      start: 9
      end: 10
      conversion:
        name: "PsysGain"
        ZeroPointTwoFiveuAperW: 0
        OneuAperW: 1
      description: PSYS Gain. Ratio of PSYS output current vs total system power.
                   0=0.25 uA/W, 1=1 uA/W.
    RSNS_RSR:
      base: uint
      start: 10
      end: 11
      conversion:
        name: "ChargeSenseResistor"
        TenMilliOhm: 0
        FiveMilliOhm: 1
      description: Charge sense resistor RSR. 0=10 mOhm, 1=5 mOhm.
    RSNS_RAC:
      base: uint
      start: 11
      end: 12
      conversion:
        name: "InputSenseResistor"
        TenMilliOhm: 0
        FiveMilliOhm: 1
      description: Input sense resistor RAC. 0=10 mOhm, 1=5 mOhm.
    PSYS_CONFIG:
      base: uint
      start: 12
      end: 14
      conversion:
        name: "PsysConfig"
        PbusAndPbat: 0
        Pbus: 1
        Reserved: 2
        Disabled: 3
      description: PSYS Enable and Definition. In low power mode (EN_LWPWR=1),
                   PSYS sensing and buffer are always disabled regardless of this value.
                   00=PBUS+PBAT, 01=PBUS, 10=Reserved, 11=Off (minimize Iq).
    EN_PROCHOT_LPWR:
      base: bool
      start: 14
      description: Enable PROCHOT during battery only low power mode. Uses independent
                   comparator to monitor system voltage with low power consumption. Do
                   not enable with adapter present.
    EN_IBAT:
      base: bool
      start: 15
      description: IBAT Enable. Enable the IBAT output buffer. In low power mode
                   (EN_LWPWR=1), IBAT buffer is always disabled regardless of this value.

CHARGE_OPTION_2:
  type: register
  address: 0x32
  size_bits: 16
  reset_value: 0x00B7
  fields:
    BATOC_VTH:
      base: uint
      start: 0
      end: 1
      conversion:
        name: "BatocThreshold"
        OneHundredThirtyThreePercent: 0
        TwoHundredPercent: 1
      description: Battery discharge overcurrent threshold as percentage of PROCHOT
                   IDCHG_TH2. Note for 1S application, threshold could derate at low
                   SRN/SRP common voltage.
    EN_BATOC:
      base: bool
      start: 1
      description: Battery discharge overcurrent (BATOC) protection enable. Upon BATOC,
                   converter is disabled. Non-latch fault, resumes after 250 ms relax time.
    ACOC_VTH:
      base: uint
      start: 2
      end: 3
      conversion:
        name: "AcocThreshold"
        OneHundredThirtyThreePercent: 0
        TwoHundredPercent: 1
      description: ACOC Limit. Set ACOC threshold as percentage of ILIM2.
                   0=133% of ILIM2, 1=200% of ILIM2.
    EN_ACOC:
      base: bool
      start: 3
      description: Input overcurrent (ACOC) protection enable. Non-latch fault with
                   250 us rising edge deglitch. After input current falls below threshold,
                   250 ms falling edge deglitch before converter restarts.
    ACX_OCP:
      base: uint
      start: 4
      end: 5
      conversion:
        name: "AcxOcpThreshold"
        High: 0
        Low: 1
      description: Fixed input current OCP threshold by sensing ACP-ACN.
                   0=280 mV (RSNS_RAC=0) / 200 mV (RSNS_RAC=1).
                   1=150 mV (RSNS_RAC=0) / 100 mV (RSNS_RAC=1).
    Q2_OCP:
      base: uint
      start: 5
      end: 6
      conversion:
        name: "Q2OcpThreshold"
        TwoHundredTenMilliVolts: 0
        OneHundredFiftyMilliVolts: 1
      description: Q2 OCP threshold by sensing Q2 VDS.
    EN_ICHG_IDCHG:
      base: uint
      start: 6
      end: 7
      conversion:
        name: "IBatPinSelect"
        DischargeCurrent: 0
        ChargeCurrent: 1
      description: IBAT pin monitor selection. 0=IBAT as discharge current,
                   1=IBAT as charge current.
    EN_EXTILIM:
      base: bool
      start: 7
      description: Enable ILIM_HIZ pin to set input current limit. When enabled,
                   input current limit is the lower of ILIM_HIZ pin and IIN_DPM register.
    PKPWR_TMAX:
      base: uint
      start: 8
      end: 10
      conversion:
        name: "PkpwrTmax"
        TwentyMilliseconds: 0
        FortyMilliseconds: 1
        EightyMilliseconds: 2
        OneSecond: 3
      description: Peak power mode overload and relax cycle time.
    PKPWR_RELAX_STAT:
      base: bool
      start: 10
      access: RW
      description: Indicator that the device is in relaxation cycle. Write 0 to exit.
    STAT_PKPWR_OVLD:
      base: bool
      start: 11
      access: RW
      description: Indicator that the device is in overloading cycle. Write 0 to exit.
    EN_PKPWR_VSYS:
      base: bool
      start: 12
      description: Enable Peak Power Mode triggered by system voltage under-shoot.
                   Threshold is VSYS_MIN register setting. Upon adapter removal, reset to 0.
    EN_PKPWR_IIN_DPM:
      base: bool
      start: 13
      description: Enable Peak Power Mode triggered by input current overshoot.
                   Threshold is IIN_DPM register. Upon adapter removal, reset to 0.
    PKPWR_TOVLD_DEG:
      base: uint
      start: 14
      end: 16
      conversion:
        name: "PkpwrTovldDeg"
        OneMillisecond: 0
        TwoMilliseconds: 1
        FiveMilliseconds: 2
        TenMilliseconds: 3
      description: Input Overload time (ILIM2 effective duration) in Peak Power Mode.

CHARGE_OPTION_3:
  type: register
  address: 0x34
  size_bits: 16
  reset_value: 0x0434
  fields:
    PSYS_OTG_IDCHG:
      base: uint
      start: 0
      end: 1
      conversion:
        name: "PsysOtgIdchg"
        BatteryMinusOtg: 0
        BatteryOnly: 1
      description: PSYS function during OTG mode.
                   0=battery discharge power minus OTG output power.
                   1=battery discharge power only.
    BATFETOFF_HIZ:
      base: bool
      start: 1
      description: Control BATFET during HIZ mode. 0=BATFET on, 1=BATFET off.
    CMP_EN:
      base: bool
      start: 2
      description: Enable Independent Comparator with effective low.
    IL_AVG:
      base: uint
      start: 3
      end: 5
      conversion:
        name: "InductorAvgCurrentClamp"
        SixAmps: 0
        TenAmps: 1
        FifteenAmps: 2
        Disabled: 3
      description: Converter inductor average current clamp. Choose the smallest option
                   higher than maximum possible converter average inductor current.
    OTG_VAP_MODE:
      base: bool
      start: 5
      description: External OTG/VAP/FRS pin control selection.
                   0=pin controls VAP mode. 1=pin controls OTG mode.
                   Do not change after OTG/VAP/FRS pin is pulled high.
    EN_VBUS_VAP:
      base: bool
      start: 6
      description: Enable the VBUS VAP for VAP operation mode 2 and 3.
    BATFET_ENZ:
      base: bool
      start: 7
      description: Turn off BATFET under battery only mode. Not allowed when not in
                   battery only mode. Forced to 0 in battery only OTG mode.
    EN_OTG_BIGCAP:
      base: bool
      start: 8
      description: Enable OTG compensation for VBUS effective capacitance larger than
                   33 uF. 0=for capacitance smaller than 33 uF, 1=for larger than 33 uF.
    EN_VSYS_MIN_SOFT_SR:
      base: bool
      start: 9
      description: Enable VSYS_MIN soft slew rate transition (1 LSB/8 us = 12.5 mV/us).
    EN_PORT_CTRL:
      base: bool
      start: 10
      description: Enable BATFET control pin by activating BATDRV pin.
                   0=Disable BATFET control (HIZ BATDRV pin).
                   1=Enable BATFET control.
    EN_ICO_MODE:
      base: bool
      start: 11
      description: Enable ICO (Input Current Optimizer) Algorithm. Automatically
                   detects optimized input current limit. Requires adapter input current
                   limit of at least 500 mA.
    EN_OTG:
      base: bool
      start: 12
      description: OTG Mode Enable. Enable device in OTG mode when OTG/VAP/FRS pin
                   is HIGH. Set OTG voltage/current registers before enabling.
    RESET_VINDPM:
      base: bool
      start: 13
      description: Reset VINDPM Threshold. Converter is disabled to measure VINDPM
                   threshold. Auto-resets to 0 when measurement is done. Not recommended
                   when battery voltage is lower than VSYS_MIN.
    RESET_REG:
      base: bool
      start: 14
      description: Reset all registers to POR default except VINDPM register.
                   Auto-resets to 0 after reset.
    EN_HIZ:
      base: bool
      start: 15
      description: Device HIZ Mode Enable. Device draws minimal quiescent current
                   with VBUS above UVLO. REGN LDO stays on, system powers from battery.
                   ADC circuits disabled.

PROCHOT_OPTION_0:
  type: register
  address: 0x36
  size_bits: 16
  reset_value: 0x4A81
  fields:
    LOWER_PROCHOT_VINDPM:
      base: bool
      start: 0
      description: Enable lower threshold of PROCHOT_VINDPM comparator.
                   0=threshold follows VINDPM register setting.
                   1=threshold determined by PROCHOT_VINDPM_80_90 bit.
    INOM_DEG:
      base: uint
      start: 1
      end: 2
      conversion:
        name: "InomDeglitchTime"
        OneMillisecond: 0
        SixtyMilliseconds: 1
      description: INOM Deglitch Time. INOM is always 10% above IIN_DPM register setting.
    VSYS_TH1:
      base: uint
      start: 2
      end: 8
      description: VSYS Threshold 1 to trigger discharging VBUS in VAP mode. 6-bit,
                   fixed 5 us deglitch. Triggers when VSYS pin voltage is below threshold.
                   Fixed DC offset 3.2 V, LSB 100 mV.
                   2S-4S range 3.2-9.5 V (default 6.4 V).
                   1S range 3.2-3.9 V (default 3.4 V).
    PROCHOT_VINDPM_80_90:
      base: uint
      start: 8
      end: 9
      conversion:
        name: "ProchotVindpmThreshold"
        EightyThreePercent: 0
        NinetyOnePercent: 1
      description: Lower threshold of PROCHOT_VINDPM comparator when
                   LOWER_PROCHOT_VINDPM=1. 0=83% of VINDPM, 1=91% of VINDPM.
    ICRIT_DEG:
      base: uint
      start: 9
      end: 11
      conversion:
        name: "IcritDeglitchTime"
        FifteenMicroseconds: 0
        OneHundredMicroseconds: 1
        FourHundredMicroseconds: 2
        EightHundredMicroseconds: 3
      description: ICRIT deglitch time to trigger PROCHOT. ICRIT threshold is 110%
                   of ILIM2.
    ILIM2_VTH:
      base: uint
      start: 11
      end: 16
      description: ILIM2 Threshold. 5-bit, percentage of IIN_DPM.
                   00001-11001 = 110%-230% (5% step).
                   11010-11110 = 250%-450% (50% step).
                   11111 = Out of Range (ignored). Default 150% (01001b).

PROCHOT_OPTION_1:
  type: register
  address: 0x38
  size_bits: 16
  reset_value: 0x41A0
  fields:
    PP_ACOK:
      base: bool
      start: 0
      description: Adapter removal PROCHOT Profile enable. EN_LWPWR=0 required to
                   assert PROCHOT pulse after adapter removal.
    PP_BATPRES:
      base: bool
      start: 1
      description: Battery removal PROCHOT Profile enable (one-shot falling edge
                   triggered). Immediately sends PROCHOT pulse after battery removal.
    PP_VSYS:
      base: bool
      start: 2
      description: VSYS PROCHOT Profile enable.
    PP_IDCHG1:
      base: bool
      start: 3
      description: IDCHG1 PROCHOT Profile enable.
    PP_INOM:
      base: bool
      start: 4
      description: INOM PROCHOT Profile enable.
    PP_ICRIT:
      base: bool
      start: 5
      description: ICRIT PROCHOT Profile enable.
    PP_COMP:
      base: bool
      start: 6
      description: Independent comparator PROCHOT Profile enable. In low power mode
                   (battery only), use EN_PROCHOT_LPWR instead.
    PP_VINDPM:
      base: bool
      start: 7
      description: VINDPM PROCHOT Profile enable.
    IDCHG_DEG1:
      base: uint
      start: 8
      end: 10
      conversion:
        name: "IdchgDeg1Time"
        SeventyEightMilliseconds: 0
        OnePointTwoFiveSeconds: 1
        FiveSeconds: 2
        TwentySeconds: 3
      description: IDCHG level 1 Deglitch Time.
    IDCHG_TH1:
      base: uint
      start: 10
      end: 16
      description: IDCHG level 1 Threshold. 6-bit, range 0-32256 mA, LSB 512 mA.
                   If 000000b, PROCHOT is always triggered. Default 8192 mA (010000b).

ADC_OPTION:
  type: register
  address: 0x3A
  size_bits: 16
  reset_value: 0x2000
  fields:
    EN_ADC_VBAT:
      base: bool
      start: 0
      description: Enable battery voltage (SRN pin) ADC channel.
    EN_ADC_VSYS:
      base: bool
      start: 1
      description: Enable system voltage (VSYS pin) ADC channel.
    EN_ADC_ICHG:
      base: bool
      start: 2
      description: Enable charge current ADC channel.
    EN_ADC_IDCHG:
      base: bool
      start: 3
      description: Enable discharge current ADC channel.
    EN_ADC_IIN:
      base: bool
      start: 4
      description: Enable input current ADC channel.
    EN_ADC_PSYS:
      base: bool
      start: 5
      description: Enable system power (PSYS pin) ADC channel.
    EN_ADC_VBUS:
      base: bool
      start: 6
      description: Enable VBUS voltage ADC channel.
    EN_ADC_CMPIN:
      base: bool
      start: 7
      description: Enable CMPIN voltage ADC channel.
    ADC_FULLSCALE:
      base: uint
      start: 13
      end: 14
      conversion:
        name: "AdcFullScale"
        TwoPointZeroFourVolts: 0
        ThreePointZeroSixVolts: 1
      description: ADC input voltage range for PSYS and CMPIN channels.
                   0=2.04 V full scale (8 mV/LSB).
                   1=3.06 V full scale (12 mV/LSB).
                   Not accurate for REGN<6 V application (VBUS and VSYS < 6 V).
    ADC_START:
      base: bool
      start: 14
      description: Start ADC conversion. Auto-resets to 0 after one-shot update completes.
    ADC_CONV:
      base: bool
      start: 15
      description: ADC conversion mode. 0=One-shot update after ADC_START=1.
                   1=Continuous update every 1 sec. Each channel conversion time
                   is 25 ms max. Total time is 25 ms times enabled channel count.

CHARGE_OPTION_4:
  type: register
  address: 0x3C
  size_bits: 16
  reset_value: 0x0048
  fields:
    STAT_PTM:
      base: bool
      start: 0
      access: RO
      description: PTM operation status. 0=not in PTM, 1=in PTM.
    STAT_IDCHG2:
      base: bool
      start: 1
      access: RO
      description: IDCHG2 PROCHOT status. Latched until read by host.
    PP_IDCHG2:
      base: bool
      start: 2
      description: IDCHG2 PROCHOT Profile enable.
    IDCHG_TH2:
      base: uint
      start: 3
      end: 6
      conversion:
        name: "IdchgTh2Percent"
        OneHundredTwentyFivePercent: 0
        OneHundredFiftyPercent: 1
        OneHundredSeventyFivePercent: 2
        TwoHundredPercent: 3
        TwoHundredFiftyPercent: 4
        ThreeHundredPercent: 5
        ThreeHundredFiftyPercent: 6
        FourHundredPercent: 7
      description: Battery discharge current limit 2 as percentage of IDCHG_TH1.
                   Setting higher than 32256 mA loses accuracy. Not recommended to
                   set higher than 20 A for 1S OTG boost operation.
    IDCHG_DEG2:
      base: uint
      start: 6
      end: 8
      conversion:
        name: "IdchgDeg2Time"
        OneHundredMicroseconds: 0
        OnePointSixMilliseconds: 1
        SixMilliseconds: 2
        TwelveMilliseconds: 3
      description: Battery discharge current limit 2 deglitch time (minimum value).
    STAT_VBUS_VAP:
      base: bool
      start: 8
      access: RO
      description: VBUS_VAP PROCHOT status. Latched until read by host.
    PP_VBUS_VAP:
      base: bool
      start: 9
      description: VBUS_VAP PROCHOT Profile enable.
    VSYS_UVP_NO_HICCUP:
      base: bool
      start: 10
      description: Disable VSYS_UVP Hiccup mode. 0=hiccup enabled (charger restarts
                   and latches off after 7 failures in 90 s). 1=hiccup disabled (direct
                   latch-off after 2 ms deglitch).
    EN_DITHER:
      base: uint
      start: 11
      end: 13
      conversion:
        name: "DitherConfig"
        Disabled: 0
        OneX: 1
        TwoX: 2
        ThreeX: 3
      description: Frequency Dither configuration.
                   0=disabled, 1=+/-2% Fs, 2=+/-4% Fs, 3=+/-6% Fs.
    VSYS_UVP:
      base: uint
      start: 13
      end: 16
      description: VSYS Under Voltage Lock Out threshold. 3-bit, range 2.4-8.0 V,
                   LSB 800 mV. Default 2.4 V (000b). After UVP triggered, charger
                   enters hiccup mode and latches off if restart fails 7 times in 90 s.
                   000=2.4 V, 001=3.2 V, 010=4.0 V, 011=4.8 V,
                   100=5.6 V, 101=6.4 V, 110=7.2 V, 111=8.0 V.

VMIN_ACTIVE_PROTECTION:
  type: register
  address: 0x3E
  size_bits: 16
  reset_value: 0x006C
  fields:
    EN_FRS:
      base: bool
      start: 0
      description: Fast Role Swap feature enable. Not recommended to change during OTG
                   operation (disables power stage for ~50 us at 800 kHz). HIZ mode holds
                   higher priority; if EN_HIZ=1, EN_FRS is forced to 0.
    EN_VSYSTH2_FOLLOW_VSYSTH1:
      base: bool
      start: 1
      description: Enable internal VSYS_TH2 to follow VSYS_TH1 setting, neglecting
                   VSYS_TH2 register value.
    VSYS_TH2:
      base: uint
      start: 2
      end: 8
      description: VSYS Threshold 2 to assert STAT_VSYS PROCHOT. 6-bit, fixed 5 us
                   deglitch. Triggers when VSYS pin voltage is below threshold.
                   Fixed DC offset 3.2 V, LSB 100 mV.
                   2S-4S range 3.2-9.5 V (default 5.9 V, 011011b).
                   1S range 3.2-3.9 V (default 3.2 V, 000000b).
    VBUS_VAP_TH:
      base: uint
      start: 9
      end: 16
      description: VAP mode VBUS PROCHOT trigger voltage threshold. 7-bit,
                   fixed DC offset 3.2 V, LSB 100 mV, range 3.2-15.9 V.
                   Default 3.2 V (0000000b).
